<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novi Sad Business Preview</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
.container{max-width:600px}
h1{font-size:2.5rem;margin-bottom:12px;background:linear-gradient(135deg,#1d1d1f,#0071e3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{color:#6e6e73;line-height:1.6;margin-bottom:24px;font-size:1.1rem}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-block;background:#0071e3;color:white;padding:14px 32px;border-radius:12px;text-decoration:none;font-size:1rem;font-weight:500;transition:all .2s}
.btn.secondary{background:#1d1d1f}
.btn:hover{background:#0077ed;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,113,227,.3)}
.btn.secondary:hover{background:#333}
.info{font-size:.85rem;color:#6e6e73;margin-top:32px}
</style>
</head>
<body>
<div class="container">
<h1>Business Website Preview</h1>
<p>This project hosts individual website previews. Please use the exact link you received.</p>
<p class="info">Internal campaign materials are not published here.</p>
</div>
</body>
</html>
